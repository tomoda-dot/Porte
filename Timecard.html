<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans JP',sans-serif;background:#f5f0ea;color:#333;min-height:100vh;overflow-x:hidden;user-select:none;-webkit-user-select:none}
.header{background:linear-gradient(135deg,#5d4037,#8d6e63);color:#fff;padding:16px 24px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:20px;letter-spacing:2px}
.header .date{font-size:15px;opacity:0.9}
.header .clock{font-size:28px;font-weight:900;letter-spacing:1px}
.container{max-width:1200px;margin:0 auto;padding:20px}
/* 利用者一覧 */
.user-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;padding:10px 0}
.user-card{background:#fff;border-radius:12px;padding:16px 12px;text-align:center;cursor:pointer;border:2px solid transparent;transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.user-card:hover{border-color:#8d6e63;transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.12)}
.user-card.done-in{border-color:#2e7d32;background:#f1f8e9}
.user-card.done-both{border-color:#1565c0;background:#e3f2fd}
.user-card .name{font-size:18px;font-weight:700;margin-bottom:4px}
.user-card .furigana{font-size:10px;color:#999;margin-bottom:6px}
.user-card .status{font-size:11px;padding:2px 8px;border-radius:10px;display:inline-block}
.user-card .status.scheduled{background:#fff3e0;color:#e65100}
.user-card .status.in{background:#e8f5e9;color:#2e7d32}
.user-card .status.out{background:#e3f2fd;color:#1565c0}
.user-card .time-info{font-size:11px;color:#888;margin-top:4px}
/* モーダル */
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:#fff;border-radius:16px;width:90%;max-width:520px;overflow:hidden;animation:slideUp .3s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.modal-header{background:#5d4037;color:#fff;padding:16px 20px;display:flex;justify-content:space-between;align-items:center}
.modal-header h2{font-size:18px;font-weight:700}
.modal-header .close-btn{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:4px 8px}
.modal-body{padding:20px}
.info-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding:10px 16px;background:#faf6f2;border-radius:10px}
.info-row .label{font-size:12px;color:#888}
.info-row .value{font-size:18px;font-weight:700}
.badges{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;justify-content:center}
.badge{font-size:11px;padding:3px 10px;border-radius:12px;font-weight:600}
.badge.bento{background:#fff3e0;color:#e65100}
.badge.pickup{background:#e3f2fd;color:#1565c0}
.sign-area{margin:16px 0}
.sign-label{font-size:12px;color:#888;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.sign-label button{font-size:11px;background:#f5f0ea;border:1px solid #ddd;border-radius:6px;padding:3px 10px;cursor:pointer}
canvas{border:2px solid #ddd;border-radius:10px;width:100%;height:200px;touch-action:none;cursor:crosshair;background:#fafafa}
.btn-clock{width:100%;padding:16px;border:none;border-radius:12px;font-size:18px;font-weight:700;cursor:pointer;letter-spacing:2px;transition:all .2s}
.btn-clock:active{transform:scale(0.97)}
.btn-in{background:linear-gradient(135deg,#2e7d32,#43a047);color:#fff}
.btn-out{background:linear-gradient(135deg,#1565c0,#1e88e5);color:#fff}
.btn-clock:disabled{opacity:.4;cursor:not-allowed}
.msg{text-align:center;padding:20px;font-size:14px;color:#888}
/* 完了アニメーション */
.success-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,.95);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.success-overlay .check{font-size:80px;margin-bottom:16px}
.success-overlay .msg-big{font-size:24px;font-weight:700;color:#333}
.success-overlay .msg-time{font-size:36px;font-weight:900;color:#5d4037;margin-top:8px}
.success-overlay .msg-sub{font-size:14px;color:#888;margin-top:12px}
/* スピナー */
.spin{width:24px;height:24px;border:3px solid #ddd;border-top-color:#5d4037;border-radius:50%;animation:sp .6s linear infinite;margin:0 auto}
@keyframes sp{to{transform:rotate(360deg)}}
.loading-center{display:flex;flex-direction:column;align-items:center;gap:10px;padding:40px;color:#888}
</style>
</head>
<body>
<div class="header">
  <div>
    <h1>⏰ タイムカード</h1>
    <div class="date" id="hd-date"></div>
  </div>
  <div class="clock" id="hd-clock"></div>
</div>
<div class="container" id="main">
  <div class="loading-center"><div class="spin"></div><span>利用者を読み込み中...</span></div>
</div>
<div id="modal-area"></div>
<div id="success-area"></div>

<script>
function gas(fn){var args=Array.prototype.slice.call(arguments,1);return new Promise(function(ok,ng){var r=google.script.run.withSuccessHandler(ok).withFailureHandler(ng);r[fn].apply(r,args);});}

var TCData=null;

// 時計更新
function updateClock(){
  var now=new Date();
  var h=String(now.getHours()).padStart(2,'0');
  var m=String(now.getMinutes()).padStart(2,'0');
  var s=String(now.getSeconds()).padStart(2,'0');
  document.getElementById('hd-clock').textContent=h+':'+m+':'+s;
}
setInterval(updateClock,1000);
updateClock();

// 初期読み込み
async function loadUsers(){
  try{
    TCData=await gas('getTimecardUsers');
    document.getElementById('hd-date').textContent=TCData.date.replace(/-/g,'/')+'（'+TCData.dow+'）';
    renderUserGrid();
  }catch(e){
    document.getElementById('main').innerHTML='<div class="msg">読み込みエラー: '+e+'</div>';
  }
}

function renderUserGrid(){
  var users=TCData.users.filter(function(u){return u.isScheduled||u.clockedIn;});
  if(users.length===0){
    document.getElementById('main').innerHTML='<div class="msg">本日の予定者がいません</div>';
    return;
  }
  var html='<div class="user-grid">';
  users.forEach(function(u){
    var cls='user-card';
    var statusHtml='';
    if(u.clockedIn&&u.clockedOut){
      cls+=' done-both';
      statusHtml='<div class="status out">✅ 退勤済</div><div class="time-info">'+u.startTime+' 〜 '+u.endTime+'</div>';
    }else if(u.clockedIn){
      cls+=' done-in';
      statusHtml='<div class="status in">🟢 出勤中</div><div class="time-info">'+u.startTime+' 〜</div>';
    }else{
      statusHtml='<div class="status scheduled">予定</div><div class="time-info">'+u.scheduleStart+' 〜 '+u.scheduleEnd+'</div>';
    }
    html+='<div class="'+cls+'" onclick="openClock(\''+u.id+'\')">';
    html+='<div class="name">'+u.name+'</div>';
    html+='<div class="furigana">'+u.furigana+'</div>';
    html+=statusHtml;
    html+='</div>';
  });
  html+='</div>';
  document.getElementById('main').innerHTML=html;
}

// 打刻モーダル
function openClock(userId){
  var u=TCData.users.find(function(x){return x.id===userId;});
  if(!u)return;
  var isOut=u.clockedIn&&!u.clockedOut;
  var isDone=u.clockedIn&&u.clockedOut;
  var action=isDone?'done':(isOut?'out':'in');
  var actionLabel=action==='in'?'出勤打刻':action==='out'?'退勤打刻':'打刻完了';
  var btnClass=action==='in'?'btn-in':'btn-out';

  var html='<div class="overlay" onclick="closeModal()">';
  html+='<div class="modal" onclick="event.stopPropagation()">';
  html+='<div class="modal-header"><h2>【'+u.name+'】</h2><button class="close-btn" onclick="closeModal()">✕</button></div>';
  html+='<div class="modal-body">';
  html+='<div class="info-row"><div><div class="label">予定時間</div><div class="value">'+u.scheduleStart+' 〜 '+u.scheduleEnd+'</div></div></div>';
  
  // バッジ
  html+='<div class="badges">';
  if(u.bento==='あり') html+='<span class="badge bento">🍱 お弁当</span>';
  if(u.pickup==='あり') html+='<span class="badge pickup">🚐 送迎</span>';
  html+='</div>';

  if(isDone){
    html+='<div class="info-row"><div><div class="label">出勤</div><div class="value" style="color:#2e7d32">'+u.startTime+'</div></div><div><div class="label">退勤</div><div class="value" style="color:#1565c0">'+u.endTime+'</div></div></div>';
    html+='<div class="msg">本日の打刻は完了しています</div>';
  }else if(isOut){
    // 退勤モード：サインなし、ボタンのみ
    html+='<div class="info-row"><div><div class="label">出勤時間</div><div class="value" style="color:#2e7d32">'+u.startTime+'</div></div></div>';
    html+='<div style="text-align:center;padding:20px 0"><div style="font-size:48px;margin-bottom:8px">🌆</div><div style="font-size:16px;color:#888;margin-bottom:20px">お疲れさまでした</div></div>';
    html+='<button class="btn-clock btn-out" id="btn-submit" onclick="submitClockOut(\''+userId+'\')">退勤打刻</button>';
  }else{
    // 出勤モード：サインあり
    html+='<div class="sign-area">';
    html+='<div class="sign-label"><span>サインエリアにサインしてください</span><button onclick="clearSign()">やり直す</button></div>';
    html+='<canvas id="sign-canvas"></canvas>';
    html+='</div>';
    html+='<button class="btn-clock btn-in" id="btn-submit" onclick="submitClock(\''+userId+'\')">出勤打刻</button>';
  }
  html+='</div></div></div>';
  document.getElementById('modal-area').innerHTML=html;

  if(!isDone&&!isOut){
    setTimeout(initCanvas,100);
  }
}

function closeModal(){
  document.getElementById('modal-area').innerHTML='';
}

// Canvas署名
var signCanvas,signCtx,isDrawing=false,hasDrawn=false;
function initCanvas(){
  signCanvas=document.getElementById('sign-canvas');
  if(!signCanvas)return;
  signCtx=signCanvas.getContext('2d');
  // 高解像度対応
  var rect=signCanvas.getBoundingClientRect();
  signCanvas.width=rect.width*2;
  signCanvas.height=rect.height*2;
  signCtx.scale(2,2);
  signCtx.lineWidth=3;
  signCtx.lineCap='round';
  signCtx.lineJoin='round';
  signCtx.strokeStyle='#333';
  hasDrawn=false;

  signCanvas.addEventListener('pointerdown',function(e){
    isDrawing=true;hasDrawn=true;
    var r=signCanvas.getBoundingClientRect();
    signCtx.beginPath();
    signCtx.moveTo(e.clientX-r.left,e.clientY-r.top);
    e.preventDefault();
  });
  signCanvas.addEventListener('pointermove',function(e){
    if(!isDrawing)return;
    var r=signCanvas.getBoundingClientRect();
    signCtx.lineTo(e.clientX-r.left,e.clientY-r.top);
    signCtx.stroke();
    e.preventDefault();
  });
  signCanvas.addEventListener('pointerup',function(){isDrawing=false;});
  signCanvas.addEventListener('pointerleave',function(){isDrawing=false;});
}

function clearSign(){
  if(!signCanvas)return;
  signCtx.clearRect(0,0,signCanvas.width,signCanvas.height);
  hasDrawn=false;
}

// 出勤打刻（サインあり）
async function submitClock(userId){
  if(!hasDrawn){alert('サインを書いてください');return;}
  var btn=document.getElementById('btn-submit');
  btn.disabled=true;
  btn.textContent='送信中...';
  try{
    var dataUrl=signCanvas.toDataURL('image/png');
    var result=await gas('clockIn',userId,dataUrl);
    closeModal();
    showSuccess(userId,'in',result.time);
    TCData=await gas('getTimecardUsers');
    renderUserGrid();
  }catch(e){
    alert('エラー: '+e);
    btn.disabled=false;
    btn.textContent='出勤打刻';
  }
}

// 退勤打刻（ボタンのみ）
async function submitClockOut(userId){
  var btn=document.getElementById('btn-submit');
  btn.disabled=true;
  btn.textContent='送信中...';
  try{
    var result=await gas('clockOut',userId);
    closeModal();
    showSuccess(userId,'out',result.time);
    TCData=await gas('getTimecardUsers');
    renderUserGrid();
  }catch(e){
    alert('エラー: '+e);
    btn.disabled=false;
    btn.textContent='退勤打刻';
  }
}

// 完了表示
function showSuccess(userId,action,time){
  var u=TCData.users.find(function(x){return x.id===userId;});
  var name=u?u.name:'';
  var label=action==='in'?'出勤しました':'退勤しました';
  var icon=action==='in'?'🌅':'🌆';
  var html='<div class="success-overlay" onclick="closeSuccess()">';
  html+='<div class="check">'+icon+'</div>';
  html+='<div class="msg-big">'+name+' さん</div>';
  html+='<div class="msg-time">'+time+'</div>';
  html+='<div class="msg-big">'+label+'</div>';
  html+='<div class="msg-sub">画面をタップして戻る</div>';
  html+='</div>';
  document.getElementById('success-area').innerHTML=html;
  // 5秒後自動で消す
  setTimeout(closeSuccess,5000);
}

function closeSuccess(){
  document.getElementById('success-area').innerHTML='';
}

loadUsers();
// 5分ごとに自動リフレッシュ
setInterval(function(){
  gas('getTimecardUsers').then(function(d){TCData=d;renderUserGrid();}).catch(function(){});
},300000);
// 全画面表示の自動化（画面タップ時）
document.addEventListener('click', function() {
  var doc = window.document;
  var docEl = doc.documentElement;
  var requestFullScreen = docEl.requestFullscreen || docEl.mozRequestFullScreen || docEl.webkitRequestFullScreen || docEl.msRequestFullscreen;
  if(!doc.fullscreenElement && !doc.mozFullScreenElement && !doc.webkitFullscreenElement && !doc.msFullscreenElement) {
    if(requestFullScreen) {
      try { requestFullScreen.call(docEl); } catch(e) {}
    }
  }
});

</script>
