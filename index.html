// 皆勤判定: 利用予定日すべてに「出席」or「通院」で出ていればtrue（遅刻・早退・欠席・体調不良はNG、未記録はスキップ）
function checkKaikin(u, allAtt, ym){
  var schDays=(u.scheduleDays||'').split(',').filter(function(d){return d;});
  if(schDays.length===0) return {kaikin:false, expected:0, ok:0, ng:0, pending:0, reason:'予定日なし'};
  var year=Number(ym.split('-')[0]), month=Number(ym.split('-')[1]);
  var dim=new Date(year, month, 0).getDate();
  var todayStr=today();
  var expected=0, okDays=0, ngDays=0, pending=0, ngReason='';
  for(var d=1;d<=dim;d++){
    var ds=ym+'-'+String(d).padStart(2,'0');
    if(!isUserActive(u,ds)) continue;
    var dw=new Date(year,month-1,d).getDay();
    var dwj=['日','月','火','水','木','金','土'][dw];
    if(schDays.indexOf(dwj)<0) continue;
    expected++; // 月全体の予定日数をカウント
    if(ds>todayStr) continue; // 未来の日は判定しない
    var rec=allAtt.find(function(a){return String(a.userId)===String(u.id)&&String(a.date)===ds;});
    if(!rec){pending++;continue;}
    if(rec.status==='出席'||rec.status==='通院'||rec.status==='予定'){okDays++;}
    else{ngDays++;ngReason=ds+' '+rec.status;}
  }
  // 皆勤条件: NG日数が0、かつ記録済みの日が1日以上ある
  var isKaikin=ngDays===0&&okDays>0&&pending===0;
  return {kaikin:isKaikin, expected:expected, ok:okDays, ng:ngDays, pending:pending, reason:ngReason};
}
var KAIKIN_BONUS=Number(S.settings.kaikinBonus)||0; // 旧互換用、手当設定に移行

// 工賃計算: (退勤-出勤-休憩)×時給。午前午後で時給が違う場合は半分ずつ分割
function calcWage(r){
  if(!r.startTime||!r.endTime)return{h:0,wage:0,items:[]};
  var sp=String(r.startTime).split(':').map(Number),ep=String(r.endTime).split(':').map(Number);
  var totalMin=ep[0]*60+ep[1]-sp[0]*60-sp[1]-(Number(r.breakMin)||0);
  var totalH=Math.max(0,totalMin/60);
  var amId=r.workTypeId||'';
  var pmId=(r.workTypeIdPm&&r.workTypeIdPm!=='')?r.workTypeIdPm:amId;
  var wtAm=amId?S.workTypes.find(function(w){return w.id===amId;}):null;
  var wtPm=pmId?S.workTypes.find(function(w){return w.id===pmId;}):null;
  // AMもPMも見つからない場合、最初の作業種別をデフォルトにする
  if(!wtAm&&!wtPm&&S.workTypes.length>0){wtAm=S.workTypes[0];wtPm=S.workTypes[0];}
  else if(!wtAm&&wtPm){wtAm=wtPm;}
  else if(wtAm&&!wtPm){wtPm=wtAm;}
  // 午前午後の作業種別が同じ → シンプル計算
  if(!wtAm||wtAm.id===wtPm.id){
    var wt=wtAm||wtPm;
    var rt=wt?Number(wt.rate):0;
    var nm=wt?wt.name:'未設定';
    return{h:totalH,wage:totalH*rt,items:[{name:nm,h:totalH,rate:rt,wage:totalH*rt}]};
  }
  // 異なる場合は半分ずつ
  var halfH=totalH/2;
  var rtAm=Number(wtAm.rate)||0,rtPm=Number(wtPm.rate)||0;
  var items=[];
  if(halfH>0)items.push({name:wtAm.name,h:halfH,rate:rtAm,wage:halfH*rtAm});
  if(halfH>0)items.push({name:wtPm.name,h:halfH,rate:rtPm,wage:halfH*rtPm});
  return{h:totalH,wage:halfH*rtAm+halfH*rtPm,items:items};
}

async function printAllIRP(){
  if(eT==='proxyReceipt'){await cAlert('代理受領書は利用者ごとに印刷してください');return;}
  showLoading('e-c','全員分を作成中...');
  var att=await cachedGas('getAttendance',eM);
  var bentoPrice=Number(S.settings.bentoPrice)||100;
  var ym=eM.split('-');var yStr=ym[0];var mStr=parseInt(ym[1]);
  var fNum=S.settings.facilityNumber||'';var fName=S.settings.facilityName||'';
  var compName=S.settings.companyName||'';var fType=S.settings.facilityType||'就労継続支援B型';
  var users=S.users.filter(function(u){return u.userStatus!=='利用終了';});
  var allH='';
  users.forEach(function(u){
    var recs=att.filter(function(a){return String(a.userId)===u.id&&['出席','遅刻','早退'].indexOf(a.status)>=0;});
    if(recs.length===0)return;
    var tW=0,tH=0,bc=0;
    recs.forEach(function(r){var cw=calcWage(r);tH+=cw.h;tW+=cw.wage;if(r.bento&&String(r.bento)!=='0'&&String(r.bento)!=='false'&&String(r.bento)!==''&&String(r.bento)!=='なし')bc++;});
    var kk=checkKaikin(u,att,eM);
    var _useNew=getAllowances().filter(function(a){return a.enabled!==false;}).length>0;
    var alResult=_useNew?calcAllowances(u,att,eM,kk):{total:kk.kaikin?KAIKIN_BONUS:0,details:[]};
    var bonus=alResult.total;var bd=bc*bentoPrice;var total=Math.round(tW)+bonus-bd;
    if(eT==='invoice')allH+=renderOneInvoice(u,recs,bc,bd,bentoPrice,yStr,mStr,compName,fName,fNum,fType);
    else if(eT==='receipt')allH+=renderOneReceipt(u,recs,tW,tH,bc,bd,bonus,total,alResult,yStr,mStr,compName,fName,fNum,fType);
  });
  if(!allH){await cAlert('出勤データのある利用者がいません');return;}
  document.getElementById('e-c').innerHTML=allH;
  setTimeout(function(){window.print();},300);
}
function prSyncDates(){
  var iy=parseInt(document.getElementById('pr-iy').value)||8;
  var im=parseInt(document.getElementById('pr-im').value)||1;
  // サービス提供年月 = 発行月 - 1
  var sy=im===1?iy-1:iy;var sm=im===1?12:im-1;
  document.getElementById('pr-sy').value=sy;
  document.getElementById('pr-sm').value=sm;
  // 受領日 = 発行月 + 1 の15日（土日祝→翌営業日）
  var ry=im===12?iy+1:iy;var rm=im===12?1:im+1;
  var wY=ry+2018;
  var ym=wY+'-'+(rm<10?'0'+rm:rm);
  gas('getClosedDays',ym).then(function(closed){
    closed=closed||[];
    var dt=new Date(wY,rm-1,15);
    while(dt.getDay()===0||dt.getDay()===6||closed.indexOf(dt.toISOString().slice(0,10))>=0)dt.setDate(dt.getDate()+1);
    document.getElementById('pr-ry').value=dt.getFullYear()-2018;
    document.getElementById('pr-rm').value=dt.getMonth()+1;
    document.getElementById('pr-rd').value=dt.getDate();
  }).catch(function(){
    // フォールバック：土日のみスキップ
    var dt=new Date(wY,rm-1,15);
    while(dt.getDay()===0||dt.getDay()===6)dt.setDate(dt.getDate()+1);
    document.getElementById('pr-ry').value=dt.getFullYear()-2018;
    document.getElementById('pr-rm').value=dt.getMonth()+1;
    document.getElementById('pr-rd').value=dt.getDate();
  });
}
function prCalc(){
  var a=parseInt(document.getElementById('pr-costA').value)||0;
  var b=parseInt(document.getElementById('pr-copayB').value)||0;
  var ab=Math.max(0,a-b);
  var s=a?ab.toLocaleString():'';
  document.getElementById('pr-ab').textContent=s;
  document.getElementById('pr-total').textContent=s;
}
async function saveProxy(){
  var uid=window._eUid;if(!uid){await cAlert('利用者を選択してください');return;}
  if(!lockUI())return;
  try{
    var sy=parseInt(document.getElementById('pr-sy').value||'0')+2018;
    var sm=parseInt(document.getElementById('pr-sm').value||'1');
    var ry=parseInt(document.getElementById('pr-ry').value||'0')+2018;
    var rm=parseInt(document.getElementById('pr-rm').value||'1');

    var costA=document.getElementById('pr-costA').value||'';
    var copayB=document.getElementById('pr-copayB').value||'';

}

    // 空行
    var adjRows=0;if(u.kaikin)adjRows++;if(u.bentoCount>0)adjRows++;

function closeSignModal(){
  document.getElementById('common-modal').innerHTML='';
}

var srSignCanvas,srSignCtx,srIsDrawing=false,srHasDrawn=false;
function initSRCanvas(){
  srSignCanvas=document.getElementById('sr-sign-canvas');
  if(!srSignCanvas)return;
  srSignCtx=srSignCanvas.getContext('2d');
  var rect=srSignCanvas.getBoundingClientRect();
  srSignCanvas.width=rect.width*2;
  srSignCanvas.height=rect.height*2;
  srSignCtx.scale(2,2);
  srSignCtx.lineWidth=3;
  srSignCtx.lineCap='round';
  srSignCtx.lineJoin='round';
  srSignCtx.strokeStyle='#333';
  srHasDrawn=false;
  srSignCanvas.addEventListener('pointerdown',function(e){
    srIsDrawing=true;srHasDrawn=true;
    var r=srSignCanvas.getBoundingClientRect();
    srSignCtx.beginPath();
    srSignCtx.moveTo(e.clientX-r.left,e.clientY-r.top);
    e.preventDefault();
  });
  srSignCanvas.addEventListener('pointermove',function(e){
    if(!srIsDrawing)return;
    var r=srSignCanvas.getBoundingClientRect();
    srSignCtx.lineTo(e.clientX-r.left,e.clientY-r.top);
    srSignCtx.stroke();
    e.preventDefault();
  });
  srSignCanvas.addEventListener('pointerup',function(){srIsDrawing=false;});
  srSignCanvas.addEventListener('pointerleave',function(){srIsDrawing=false;});
}

function clearSRSign(){
  if(!srSignCanvas)return;
  srSignCtx.clearRect(0,0,srSignCanvas.width,srSignCanvas.height);
  srHasDrawn=false;
}

async function saveSRSign(userId,dateStr){
  if(!srHasDrawn){await cAlert('サインを書いてください');return;}
  var btn=document.getElementById('sr-sign-btn');
  btn.disabled=true;btn.textContent='保存中...';
  try{
    var dataUrl=srSignCanvas.toDataURL('image/png');
    await gas('saveSignatureForDate',userId,dateStr,dataUrl);
    closeSignModal();
    // 実績記録票を再読み込み
    showLoading('e-c','データを更新中...');
    var sr=await gas('getServiceRecordData',eM);
    window._srData=sr;
    renderServiceRecord(sr,(S.settings.facilityName||'事業所'));
  }catch(e){
    await cAlert('保存失敗: '+e);
    btn.disabled=false;btn.textContent='サインを保存';
  }
}

var _staffTab='list',_staffYM=null;

    '</div><div id="staff-content"></div><div id="st-modal"></div>';

  else renderStaffAttendance();
}
function renderStaffList(){
  document.getElementById('staff-content').innerHTML='<div style="text-align:right;margin-bottom:8px"><button class="bp" onclick="openSM()">＋ 新規登録</button></div>'+
    '<div class="card"><table><thead><tr><th>氏名</th><th>役職</th><th>入職日</th><th>退職日</th><th>担当数</th></tr></thead><tbody id="st-tb"></tbody></table></div>';
  renderSTbl();
}
function _isStaffActive(s,ym){
  // 入職前チェック
  if(s.startDate){
    var stParts=s.startDate.split('-');var stYM=parseInt(stParts[0])*100+parseInt(stParts[1]);
    var checkParts=ym?ym.split('-'):[new Date().getFullYear().toString(),(new Date().getMonth()+1).toString()];
    var checkYM=parseInt(checkParts[0])*100+parseInt(checkParts[1]);
    if(checkYM<stYM)return false;
  }
  // 退職後チェック
  if(!s.endDate)return true;
  var endParts=s.endDate.split('-');var endYM=parseInt(endParts[0])*100+parseInt(endParts[1]);
  var checkParts2=ym?ym.split('-'):[new Date().getFullYear().toString(),(new Date().getMonth()+1).toString()];
  var checkYM2=parseInt(checkParts2[0])*100+parseInt(checkParts2[1]);
  return checkYM2<=endYM;
}
function renderSTbl(){
  var thisYM=new Date().getFullYear()+'-'+String(new Date().getMonth()+1).padStart(2,'0');
  var active=S.staff.filter(function(s){return _isStaffActive(s,thisYM);});
  var retired=S.staff.filter(function(s){return!_isStaffActive(s,thisYM);});
  var rows='';
  if(active.length===0&&retired.length===0){
    rows='<tr><td colspan="5" style="text-align:center;color:var(--sub);padding:28px">スタッフが登録されていません</td></tr>';
  }
  active.forEach(function(s){rows+=_staffRow(s);});
  if(retired.length>0){
    rows+='<tr><td colspan="5" style="background:#f5f0ea;color:var(--sub);font-size:11px;padding:6px 10px">入職前・退職済（'+retired.length+'名）</td></tr>';
    retired.forEach(function(s){rows+=_staffRow(s,true);});
  }
  document.getElementById('st-tb').innerHTML=rows;
}
function _staffRow(s,isRetired){
  var cnt=S.users.filter(function(u){return u.staffId===s.id;}).length;
  var style=isRetired?'opacity:0.5':'';
  return'<tr style="'+style+';cursor:pointer" onclick=\'openSM('+JSON.stringify(s).replace(/\'/g,"&#39;")+')\'>'+
    '<td style="font-weight:600">'+esc(s.name)+'</td><td>'+esc(s.role||'')+'</td>'+
    '<td style="font-size:11px">'+(s.startDate?fmtDate(s.startDate):'-')+'</td>'+
    '<td style="font-size:11px">'+(s.endDate?'<span style="color:#c62828">'+fmtDate(s.endDate)+'</span>':'-')+'</td>'+
    '<td>'+cnt+'名</td></tr>';
}

async function renderStaffAttendance(){
  var el=document.getElementById('staff-content');
  el.innerHTML='<div class="loading-center"><div class="spin"></div></div>';
  try{
    var att=await gas('getStaffAttendance',_staffYM);

    var dim=new Date(y,m,0).getDate();var dowNames=['日','月','火','水','木','金','土'];

    var _activeStaff=S.staff.filter(function(s){return _isStaffActive(s,ym);});

    var h='<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">';

    h+='<span style="font-size:12px;color:var(--sub)">常勤所定: '+STANDARD_HOURS+'h/月</span></div>';

    // 常勤換算サマリー
    h+='<div class="card" style="overflow-x:auto;margin-bottom:16px"><table><thead><tr><th>氏名</th><th>職種</th><th>出勤日数</th><th>総労働時間</th><th>常勤換算</th></tr></thead><tbody>';
    _activeStaff.forEach(function(s){
      var recs=att.filter(function(a){return String(a.staffId)===String(s.id);});

        totalMin+=Math.max(0,wMin-breakMin);
      });

      var fteColor=fte>=1?'var(--grn)':(fte>=0.5?'#ff9800':'#c62828');
      h+='<tr><td style="font-weight:600">'+esc(s.name)+'</td><td>'+esc(s.role||'')+'</td>';

        var rec=att.find(function(a){return String(a.staffId)===String(s.id)&&a.date===ds;});
        if(rec&&rec.startTime){
          var shift=rec.shift||'';

function editStaffAtt(staffId,staffName,date){
  var h='<div class="overlay" onclick="closeModal(\'st-modal\')"><div class="modal" style="width:380px" onclick="event.stopPropagation()"><div class="modal-hd"><h3>打刻編集</h3><button class="modal-close" onclick="closeModal(\'st-modal\')">✕</button></div>';
  h+='<div style="padding:8px 0;font-size:13px;font-weight:600;color:var(--pri)">'+staffName+' — '+fmtDate(date)+'</div>';
  h+='<div style="display:flex;gap:12px;margin:12px 0"><div class="field" style="flex:1"><label>出勤時間</label><input type="time" id="sea-start" style="width:100%"></div>';
  h+='<div class="field" style="flex:1"><label>退勤時間</label><input type="time" id="sea-end" style="width:100%"></div></div>';
  h+='<div class="field"><label>休憩（分）</label><input type="number" id="sea-break" value="60" style="width:100px"></div>';
  h+='<div class="btns"><button class="bg" onclick="deleteStaffAtt(\''+staffId+'\',\''+date+'\')" style="color:#c62828">削除</button>';
  h+='<button class="bg" onclick="closeModal(\'st-modal\')">取消</button>';
  h+='<button class="bp" onclick="saveStaffAtt(\''+staffId+'\',\''+date+'\')">保存</button></div></div></div>';
  document.getElementById('st-modal').innerHTML=h;
  gas('getStaffAttendanceByDate',date).then(function(att){
    var rec=att.find(function(a){return String(a.staffId)===staffId;});
    if(rec){if(rec.startTime)document.getElementById('sea-start').value=rec.startTime;if(rec.endTime)document.getElementById('sea-end').value=rec.endTime;if(rec.breakMin)document.getElementById('sea-break').value=rec.breakMin;}
  });
}
async function saveStaffAtt(staffId,date){
  var startTime=document.getElementById('sea-start').value;var endTime=document.getElementById('sea-end').value;var breakMin=document.getElementById('sea-break').value;
  if(!startTime){await cAlert('出勤時間を入力してください');return;}
  var shift=_detectShift(startTime);
  if(!lockUI())return;
  try{
    var r=await supabase.from('スタッフ出欠').select('id').eq('staffId',staffId).eq('date',date).limit(1);
    if(r.data&&r.data.length>0){await supabase.from('スタッフ出欠').update({startTime:startTime,endTime:endTime||null,breakMin:breakMin,shift:shift}).eq('id',r.data[0].id);}
    else{await supabase.from('スタッフ出欠').insert([{id:_genId('sa'),staffId:staffId,date:date,startTime:startTime,endTime:endTime||null,breakMin:breakMin,shift:shift}]);}
    toast('✅ 保存しました');closeModal('st-modal');renderStaffAttendance();
  }catch(e){await cAlert('保存失敗: '+e);}finally{unlockUI();}
}
async function deleteStaffAtt(staffId,date){
  if(!await cConfirm('この打刻を削除しますか？'))return;
  try{var r=await supabase.from('スタッフ出欠').select('id').eq('staffId',staffId).eq('date',date).limit(1);if(r.data&&r.data.length>0)await supabase.from('スタッフ出欠').delete().eq('id',r.data[0].id);toast('削除しました');closeModal('st-modal');renderStaffAttendance();}
  catch(e){await cAlert('削除失敗: '+e);}
}

async function saveAllowance(idx){
  var name=document.getElementById('al-name').value;
  var amount=Number(document.getElementById('al-amount').value);
  if(!name||!amount){await cAlert('手当名と金額は必須です');return;}
  var obj={name:name,amount:amount,
    condition:document.getElementById('al-condition').value,
    conditionValue:document.getElementById('al-cv').value,
    enabled:document.getElementById('al-enabled').checked};
  var als=getAllowances();
  if(idx!==undefined){als[idx]=obj;}else{als.push(obj);}
  if(!lockUI())return;
  try{
    await gas('saveSetting','allowances',JSON.stringify(als));
    S.settings.allowances=JSON.stringify(als);
    closeModal('al-modal');
    renderSettings(document.getElementById('content'));
  }catch(e){await cAlert('保存失敗: '+e);}finally{unlockUI();}
}
async function deleteAllowance(idx){
  if(!await cConfirm('この手当を削除しますか？'))return;
  var als=getAllowances();als.splice(idx,1);
  if(!lockUI())return;
  try{
    await gas('saveSetting','allowances',JSON.stringify(als));
    S.settings.allowances=JSON.stringify(als);
    renderSettings(document.getElementById('content'));
  }catch(e){await cAlert('削除失敗: '+e);}finally{unlockUI();}
}
// 手当計算（工賃計算から呼び出し）
function calcAllowances(user,att,ym,kaikinResult){
  var als=getAllowances().filter(function(a){return a.enabled!==false;});
  var total=0;var details=[];
  var recs=att.filter(function(a){return String(a.userId)===String(user.id)&&['出席','遅刻','早退'].indexOf(a.status)>=0;});
  als.forEach(function(a){
    var match=false;
    if(a.condition==='kaikin'){match=kaikinResult.kaikin;}
    else if(a.condition==='seikin'){match=!kaikinResult.kaikin&&kaikinResult.ng<=2&&kaikinResult.ok>0;}
    else if(a.condition==='all'){match=recs.length>0;}
    else if(a.condition==='birthday'){
      if(user.birthdate){var bd=String(user.birthdate).substring(5,7);var cm=ym.split('-')[1];match=bd===cm;}
    }
    else if(a.condition==='days_over'){var threshold=parseInt(a.conditionValue)||0;match=recs.length>=threshold;}
    else if(a.condition==='no_pickup'){match=recs.length>0&&String(user.pickup||'')!=='あり';}
    else if(a.condition==='custom'){
      // カスタム手当は手動選択。_customAllowanceMapに設定があればマッチ
      var key=user.id+'_'+a.name;
      match=window._customAllowanceMap&&window._customAllowanceMap[key];
    }
    if(match){total+=a.amount;details.push(a);}
  });
  return{total:total,details:details};
}
// カスタム手当の手動選択状態
if(!window._customAllowanceMap)window._customAllowanceMap={};
if(!window._expandedWageRows)window._expandedWageRows={};
function getCustomAllowances(){
  return getAllowances().filter(function(a){return a.enabled!==false&&a.condition==='custom';});
}
function toggleCustomAllowance(userId,alName){
  var key=userId+'_'+alName;
  window._customAllowanceMap[key]=!window._customAllowanceMap[key];
  // 現在の展開状態を保存
  document.querySelectorAll('[id^="wr-"]').forEach(function(el){
    window._expandedWageRows[el.id]=el.style.display!=='none';
  });
  loadW();
}

  if(!date||!desc){await cAlert('発生日と状況・経緯は必須です');return;}
  var userSel=document.getElementById('inc-user');
  var userName='';
  if(userSel.value){var su=S.users.find(function(x){return x.id===userSel.value;});if(su)userName=su.name;}

var _trainData=[],_trainReports=[],_trainFY=null;

async function renderTraining(c){
  if(!_trainFY)_trainFY=_getFY();

    _trainData=await gas('getTrainings');

  }catch(e){document.getElementById('trn-area').innerHTML='<div class="card" style="color:#c62828">読み込みエラー: '+e+'</div>';}
}

function loadTrainingList(){
  var el=document.getElementById('trn-area');
  var fy=_trainFY;
  // FY range: April fy ~ March fy+1
  var fyStart=fy+'-04-01',fyEnd=(fy+1)+'-03-31';
  var fyData=_trainData.filter(function(t){return(t.date||'')>=fyStart&&(t.date||'')<=fyEnd;});
  var kenshu=fyData.filter(function(x){return x.category==='研修';}).length;
  var iinkai=fyData.filter(function(x){return x.category==='委員会';}).length;
  var upcoming=fyData.filter(function(x){return(x.date||'')>=today();}).length;

  var h='<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">';
  h+='<button class="bg" onclick="_trainFY--;loadTrainingList()" style="padding:4px 10px">◀</button>';
  h+='<span style="font-size:16px;font-weight:700">令和'+(fy-2018)+'年度（'+fy+'年4月〜'+(fy+1)+'年3月）</span>';
  h+='<button class="bg" onclick="_trainFY++;loadTrainingList()" style="padding:4px 10px">▶</button></div>';

  h+='<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px">';
  h+='<div class="stat"><div class="stat-l">年度合計</div><div class="stat-v">'+fyData.length+'</div></div>';
  h+='<div class="stat" style="border-color:#1565c0"><div class="stat-l">📖 研修</div><div class="stat-v" style="color:#1565c0">'+kenshu+'</div></div>';
  h+='<div class="stat" style="border-color:#2e7d32"><div class="stat-l">🏛️ 委員会</div><div class="stat-v" style="color:#2e7d32">'+iinkai+'</div></div>';
  h+='<div class="stat" style="border-color:#ff9800"><div class="stat-l">📅 今後</div><div class="stat-v" style="color:#ff9800">'+upcoming+'</div></div>';
  h+='</div>';

  // 年度カレンダー（4月〜3月：月単位）
  h+='<div class="card" style="padding:12px;margin-bottom:16px">';
  h+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px">';
  for(var mi=0;mi<12;mi++){
    var mYear=mi<9?fy:fy+1;var mMonth=mi<9?mi+4:mi-8;
    var ym=mYear+'-'+String(mMonth).padStart(2,'0');

    var isCurrentMonth=(ym===today().substring(0,7));

    h+='<div style="border:1px solid '+(isCurrentMonth?'var(--pri)':'#e0d6cf')+';border-radius:8px;padding:8px;background:'+(isCurrentMonth?'#faf6f2':'#fff')+';min-height:80px">';
    h+='<div style="font-weight:700;font-size:14px;margin-bottom:6px;color:'+(isCurrentMonth?'var(--pri)':'#333')+'">'+mMonth+'月</div>';
    if(mEvents.length===0){
      h+='<div style="font-size:10px;color:#ccc">予定なし</div>';
    }else{
      mEvents.sort(function(a,b){return(a.date||'').localeCompare(b.date||'');});
      mEvents.forEach(function(ev){
        var catColor=ev.category==='研修'?'#1565c0':'#2e7d32';
        var catBg=ev.category==='研修'?'#e3f2fd':'#e8f5e9';
        var day=parseInt((ev.date||'').split('-')[2])||'';
        h+='<div onclick="openTrainingDetail(\''+ev.id+'\')" style="font-size:10px;padding:3px 5px;margin-bottom:3px;background:'+catBg+';color:'+catColor+';border-radius:4px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">';
        h+=day+'日 '+esc(ev.title||ev.type||'');
        h+='</div>';

  h+='</div>';
  h+='<div style="display:flex;gap:16px;margin-top:8px;font-size:11px;color:#666;justify-content:center">';
  h+='<span><span style="display:inline-block;width:12px;height:12px;background:#e3f2fd;border-radius:2px;vertical-align:middle;margin-right:3px"></span>研修</span>';
  h+='<span><span style="display:inline-block;width:12px;height:12px;background:#e8f5e9;border-radius:2px;vertical-align:middle;margin-right:3px"></span>委員会</span>';
  h+='</div></div>';

  h+='<div style="display:flex;justify-content:flex-end;margin-bottom:12px"><button class="bp" onclick="openTrainingForm()">＋ 新規登録</button></div>';

  if(fyData.length===0){
    h+='<tr><td colspan="6" style="text-align:center;color:var(--sub);padding:20px">この年度の登録がありません</td></tr>';
  }
  var sorted=fyData.slice().sort(function(a,b){return(a.date||'').localeCompare(b.date||'');});
  sorted.forEach(function(tr){
    var catColor=tr.category==='研修'?'#1565c0':'#2e7d32';
    var catBg=tr.category==='研修'?'#e3f2fd':'#e8f5e9';
    var reports=_trainReports.filter(function(r){return r.trainingId===tr.id;});
    var submitted=reports.filter(function(r){return r.report&&r.report.length>0;}).length;
    var attended=reports.filter(function(r){return r.attended==='出席';}).length;
    var isPast=(tr.date||'')<today();
    h+='<tr>';
    h+='<td style="font-size:12px">'+fmtDate(tr.date)+'</td>';

    h+='<td style="font-size:12px">'+esc(tr.type||'')+'</td>';
    h+='<td style="font-weight:600">'+esc(tr.title||'')+'</td>';
    h+='<td style="font-size:11px">';
    if(isPast){h+='出席 '+attended+'名 / 報告 '+submitted+'名';}
    else{h+='<span style="color:#ff9800">予定</span>';}
    h+='</td>';
    h+='<td><button class="bg" onclick="openTrainingDetail(\''+tr.id+'\')" style="font-size:11px;padding:2px 8px">詳細</button></td>';
    h+='</tr>';
  });
  h+='</tbody></table></div>';
  el.innerHTML=h;
}

async function saveTraining(id){
  var date=document.getElementById('trn-date').value;
  var title=document.getElementById('trn-title').value;
  if(!date||!title){await cAlert('日程とタイトルは必須です');return;}
  var obj={date:date,category:document.getElementById('trn-cat').value,
    type:document.getElementById('trn-type').value,title:title,
    location:document.getElementById('trn-loc').value,
    content:document.getElementById('trn-content').value,
    required:document.getElementById('trn-req').value};
  if(!lockUI())return;
  try{
    if(id){obj.id=id;await gas('updateTraining',obj);}
    else{await gas('addTraining',obj);}
    _trainData=await gas('getTrainings');toast('✅ 保存しました');loadTrainingList();
  }catch(e){await cAlert('保存失敗: '+e);}finally{unlockUI();}
}

async function deleteTraining(id){

  try{await gas('deleteTraining',id);_trainData=await gas('getTrainings');_trainReports=await gas('getTrainingReports');toast('削除しました');loadTrainingList();}
  catch(e){await cAlert('削除失敗: '+e);}finally{unlockUI();}
}

// ─── 開所日カレンダー ───
var _closedDaysCache={};
function changeCalMonth(delta){
  var inp=document.getElementById('cal-ym');if(!inp)return;
  var p=inp.value.split('-'),y=Number(p[0]),m=Number(p[1])+delta;
  if(m<1){m=12;y--;}if(m>12){m=1;y++;}
  inp.value=y+'-'+String(m).padStart(2,'0');
  loadClosedCal(inp.value);
}

async function loadClosedCal(ym){
  var el=document.getElementById('closed-cal');if(!el)return;
  showLoading(el,'読み込み中...');
  try{
    var closed=await gas('getClosedDays',ym);
    // 未設定の月は日曜日をデフォルト閉所にして自動保存
    if(!closed||closed.length===0){
      var p=ym.split('-'),yr=Number(p[0]),mo=Number(p[1]);
      var dim=new Date(yr,mo,0).getDate();
      closed=[];
      for(var sd=1;sd<=dim;sd++){
        if(new Date(yr,mo-1,sd).getDay()===0){
          closed.push(ym+'-'+String(sd).padStart(2,'0'));
        }
      }
      await gas('setClosedDays',ym,closed);
    }
    _closedDaysCache[ym]=closed;
    renderClosedCal(ym,closed);
  }catch(e){el.innerHTML='読み込み失敗';}
}

function renderClosedCal(ym,closed){
  var el=document.getElementById('closed-cal');if(!el)return;
  var p=ym.split('-'),yr=Number(p[0]),mo=Number(p[1]);
  var daysInMonth=new Date(yr,mo,0).getDate();
  var firstDow=new Date(yr,mo-1,1).getDay();
  var holidays=getJPHolidays(yr,mo);
  var dwNames=['日','月','火','水','木','金','土'];

  // 開所日数カウント
  var openCount=0;
  for(var dd=1;dd<=daysInMonth;dd++){
    var ds=ym+'-'+String(dd).padStart(2,'0');
    if(closed.indexOf(ds)<0)openCount++;
  }
  var info=document.getElementById('cal-info');
  if(info) info.textContent=yr+'年'+String(mo).padStart(2,'0')+'月 (開所数:'+openCount+')';

  var h='<table style="width:100%;border-collapse:collapse;table-layout:fixed">';
  h+='<thead><tr>';
  for(var di=0;di<7;di++){
    var dc=di===0?'color:#c62828':di===6?'color:#1565c0':'';
    h+='<th style="padding:6px;text-align:center;font-size:13px;font-weight:700;'+dc+'">'+dwNames[di]+'</th>';
  }
  h+='</tr></thead><tbody><tr>';

  // 空セル
  for(var e=0;e<firstDow;e++) h+='<td style="padding:4px;border:1px solid #eee"></td>';

  for(var d=1;d<=daysInMonth;d++){
    var ds=ym+'-'+String(d).padStart(2,'0');
    var dow=new Date(yr,mo-1,d).getDay();
    var isClosed=closed.indexOf(ds)>=0;
    var hol=holidays[d]||'';
    var isWeekend=dow===0||dow===6;
    var datColor=dow===0?'#c62828':dow===6?'#1565c0':'#333';

    var bg=isClosed?'#fafafa':(isWeekend?'#f0fff0':'#e8f5e9');
    var icon=isClosed?'':'<div style="font-size:24px;margin:4px 0;color:#4caf50">✓</div>';

    h+='<td style="padding:6px;border:1px solid #eee;text-align:center;vertical-align:top;height:70px;background:'+bg+';cursor:pointer" onclick="toggleClosedDay(\''+ym+'\',\''+ds+'\')">';
    h+='<div style="font-size:12px;font-weight:700;color:'+datColor+'">'+d+'日</div>';
    if(hol) h+='<div style="font-size:9px;color:#c62828">('+hol+')</div>';
    h+=icon;
    h+='</td>';

    if(dow===6&&d<daysInMonth) h+='</tr><tr>';
  }
  // 残りの空セル
  var lastDow=new Date(yr,mo-1,daysInMonth).getDay();
  for(var e2=lastDow+1;e2<=6;e2++) h+='<td style="padding:4px;border:1px solid #eee"></td>';
  h+='</tr></tbody></table>';
  el.innerHTML=h;
}

async function toggleClosedDay(ym,ds){
  var closed=_closedDaysCache[ym]||[];
  var idx=closed.indexOf(ds);
  if(idx>=0){closed.splice(idx,1);}else{closed.push(ds);}
  _closedDaysCache[ym]=closed;
  renderClosedCal(ym,closed);
  try{await gas('setClosedDays',ym,closed);}catch(e){await cAlert('保存失敗');}
}

function getJPHolidays(y,m){
  var h={};
  if(m===1){h[1]='元日';h[2]='振替';var sM=Math.floor((8+6)/7)*7-6+1;if(sM>0)h[sM>14?14:sM]='成人の日';}
  if(m===2)h[11]='建国記念の日';
  if(m===2)h[23]='天皇誕生日';
  if(m===3){var ve=Math.floor(20.8431+0.242194*(y-1980))-Math.floor((y-1980)/4);h[ve]='春分の日';}
  if(m===4)h[29]='昭和の日';
  if(m===5){h[3]='憲法記念日';h[4]='みどりの日';h[5]='こどもの日';h[6]='振替休日';}
  if(m===7){var uM=1;var cnt=0;for(var d=1;d<=31;d++){if(new Date(y,6,d).getDay()===1){cnt++;if(cnt===3){uM=d;break;}}}h[uM]='海の日';}
  if(m===8)h[11]='山の日';
  if(m===9){var sM2=1;var cnt2=0;for(var d2=1;d2<=30;d2++){if(new Date(y,8,d2).getDay()===1){cnt2++;if(cnt2===3){sM2=d2;break;}}}h[sM2]='敬老の日';var ae=Math.floor(23.2488+0.242194*(y-1980))-Math.floor((y-1980)/4);h[ae]='秋分の日';}
  if(m===10){var sM3=1;var cnt3=0;for(var d3=1;d3<=31;d3++){if(new Date(y,9,d3).getDay()===1){cnt3++;if(cnt3===2){sM3=d3;break;}}}h[sM3]='スポーツの日';}
  if(m===11){h[3]='文化の日';h[23]='勤労感謝の日';}
  return h;
}

async function saveTpl(id){if(!lockUI())return;
  var d={name:document.getElementById('tpl-name').value,content:document.getElementById('tpl-content').value};

  try{
    if(id){d.id=id;await gas('updateTemplate',d);}else{await gas('addTemplate',d);}
    S.templates=await gas('getTemplates');
    closeModal('tpl-modal');
    renderSettings(document.getElementById('content'));
  }catch(e){await cAlert('保存に失敗: '+e);}
}
async function delTpl(id){
  if(!await cConfirm('このテンプレートを削除しますか？'))return;
  try{
    await gas('deleteTemplate',id);
    S.templates=await gas('getTemplates');
    renderSettings(document.getElementById('content'));
  }catch(e){await cAlert('削除に失敗');}
}
